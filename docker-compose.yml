services:
  cottonpulsebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cottonpulsebot
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # Resource limits — adjust for your VPS
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "python", "-c", "from bot.config import settings; print('OK')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
